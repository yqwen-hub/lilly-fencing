name: Update profile page

on:
  workflow_dispatch:

  schedule:
    - cron: "0 12 * * *"   # runs daily at 12:00 UTC

jobs:
  update-profile:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:

      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install libs
        run: |
          pip install requests beautifulsoup4

      - name: Run updater
        run: python update_profile.py

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add profile.html
          git diff --staged --quiet || git commit -m "auto update profile"
          git push